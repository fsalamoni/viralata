  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

u002Fstyle>\n<\u002Fhelmet>\n<div style=\"min-height:100vh; min-height:100dvh; display:flex; flex-direction:column; font-family:'Manrope',ui-sans-serif,system-ui,sans-serif; color:hsl(20 25% 13%); background:hsl(38 45% 97%); position:relative;\">\n\n  <!-- ================= MINIMAL HEADER (Home / Login) ================= -->\n  <sc-if value=\"{{ showMinimalHeader }}\" hint-placeholder-val=\"{{ true }}\">\n    <header style=\"position:sticky; top:0; z-index:40; display:flex; align-items:center; justify-content:space-between; padding:14px 24px; backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px); background:hsl(38 45% 97% / 0.72); border-bottom:1px solid hsl(30 20% 88% / 0.7);\">\n      <div onclick=\"{{ goHome }}\" style=\"display:flex; align-items:center; gap:10px; cursor:pointer;\">\n        <span style=\"display:flex; width:38px; height:38px; align-items:center; justify-content:center; border-radius:13px; background:linear-gradient(135deg, hsl(17 72% 45%), hsl(40 88% 54%)); color:white; box-shadow:0 10px 22px -10px hsl(17 72% 30% / 0.65); flex-shrink:0;\">\n          <span style=\"font-family:'Material Symbols Outlined'; font-size:20px;\">pets<\u002Fspan>\n        <\u002Fspan>\n        <span style=\"font-family:'Sora',sans-serif; font-weight:800; font-size:19px; letter-spacing:-0.02em;\">Viralata<\u002Fspan>\n      <\u002Fdiv>\n      <sc-if value=\"{{ isAuthenticated }}\">\n        <button onclick=\"{{ goFeed }}\" style=\"display:flex; align-items:center; gap:6px; height:40px; padding:0 18px; border:none; border-radius:999px; background:linear-gradient(135deg, hsl(17 72% 45%), hsl(40 88% 54%)); color:white; font-family:'Manrope'; font-weight:700; font-size:13.5px; cursor:pointer; box-shadow:0 14px 26px -14px hsl(17 72% 30% / 0.6);\">\n          Ir para o Feed\n          <span style=\"font-family:'Material Symbols Outlined'; font-size:17px;\">arrow_forward<\u002Fspan>\n        <\u002Fbutton>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ isGuest }}\">\n        <button onclick=\"{{ goLogin }}\" style=\"height:40px; padding:0 20px; border:none; border-radius:999px; background:linear-gradient(135deg, hsl(17 72% 45%), hsl(40 88% 54%)); color:white; font-family:'Manrope'; font-weight:700; font-size:13.5px; cursor:pointer; box-shadow:0 14px 26px -14px hsl(17 72% 30% / 0.6);\">Entrar<\u002Fbutton>\n      <\u002Fsc-if>\n    <\u002Fheader>\n  <\u002Fsc-if>\n\n  <!-- ================= APP HEADER — DESKTOP ================= -->\n  <sc-if value=\"{{ showAppHeaderDesktop }}\">\n    <header style=\"position:sticky; top:0; z-index:40; display:flex; align-items:center; justify-content:space-between; gap:18px; padding:12px 32px; backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px); background:hsl(38 45% 97% / 0.78); border-bottom:1px solid hsl(30 20% 88% / 0.7);\">\n      <div onclick=\"{{ goHome }}\" style=\"display:flex; align-items:center; gap:10px; cursor:pointer; flex-shrink:0;\">\n        <span style=\"display:flex; width:36px; height:36px; align-items:center; justify-content:center; border-radius:12px; background:linear-gradient(135deg, hsl(17 72% 45%), hsl(40 88% 54%)); color:white; box-shadow:0 10px 20px -10px hsl(17 72% 30% / 0.6);\">\n          <span style=\"font-family:'Material Symbols Outlined'; font-size:19px;\">pets<\u002Fspan>\n        <\u002Fspan>\n        <span style=\"font-family:'Sora',sans-serif; font-weight:800; font-size:18px; letter-spacing:-0.02em;\">Viralata<\u002Fspan>\n      <\u002Fdiv>\n\n      <nav style=\"display:flex; align-items:center; gap:4px;\">\n        <sc-for list=\"{{ topNavItems }}\" as=\"item\" hint-placeholder-count=\"3\">\n          <button onclick=\"{{ item.onClick }}\" style=\"{{ item.style }}\">\n            <span style=\"font-family:'Material Symbols Outlined'; font-size:18px;\">{{ item.icon }}<\u002Fspan>\n            {{ item.label }}\n          <\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fnav>\n\n      <div style=\"display:flex; align-items:center; gap:10px; flex-shrink:0; position:relative;\">\n        <button onclick=\"{{ goCreatePet }}\" style=\"display:flex; align-items:center; gap:6px; height:38px; padding:0 16px; border:none; border-radius:999px; background:linear-gradient(135deg, hsl(17 72% 45%), hsl(40 88% 54%)); color:white; font-family:'Manrope'; font-weight:700; font-size:13px; cursor:pointer; box-shadow:0 12px 22px -12px hsl(17 72% 30% / 0.6);\">\n          <span style=\"font-family:'Material Symbols Outlined'; font-size:17px;\">add<\u002Fspan>\n          Cadastrar Pet\n        <\u002Fbutton>\n        <button onclick=\"{{ toggleNotifPanel }}\" style=\"position:relative; width:38px; height:38px; border-radius:999px; border:1px solid hsl(30 20% 88%); background:hsl(30 45% 99%); display:flex; align-items:center; justify-content:center; cursor:pointer; color:hsl(20 25% 13%);\">\n          <span style=\"font-family:'Material Symbols Outlined'; font-size:19px;\">notifications<\u002Fspan>\n          <span style=\"position:absolute; top:6px; right:7px; width:7px; height:7px; border-radius:999px; background:hsl(9 62% 46%);\"><\u002Fspan>\n        <\u002Fbutton>\n        <button onclick=\"{{ toggleAvatarMenu }}\" style=\"width:38px; height:38px; border-radius:999px; border:2px solid white; background:linear-gradient(135deg, hsl(40 88% 54%), hsl(17 72% 45%)); color:white; font-family:'Sora'; font-weight:700; font-size:13px; cursor:pointer; box-shadow:0 6px 16px -8px hsl(20 40% 20% / 0.5);\">{{ currentUser.initials }}<\u002Fbutton>\n\n        <sc-if value=\"{{ avatarMenuOpen }}\">\n          <div style=\"position:absolute; top:46px; right:0; width:230px; background:hsl(30 45% 99%); border:1px solid hsl(30 20% 88%); border-radius:18px; box-shadow:0 24px 50px -20px hsl(20 40% 15% / 0.35); padding:8px; z-index:60; animation:vl-fadeUp 0.16s ease;\">\n            <div style=\"padding:10px 12px; border-bottom:1px solid hsl(30 20% 90%); margin-bottom:6px;\">\n              <div style=\"font-weight:700; font-size:13.5px;\">{{ currentUser.name }}<\u002Fdiv>\n              <div style=\"font-size:12px; color:hsl(20 12% 40%);\">{{ currentUser.email }}<\u002Fdiv>\n            <\u002Fdiv>\n            <sc-for list=\"{{ avatarMenuItems }}\" as=\"mi\" hint-placeholder-count=\"4\">\n              <button onclick=\"{{ mi.onClick }}\" style=\"{{ mi.style }}\">\n                <span style=\"font-family:'Material Symbols Outlined'; font-size:18px;\">{{ mi.icon }}<\u002Fspan>\n                {{ mi.label }}\n              <\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fheader>\n  <\u002Fsc-if>\n\n  <!-- ================= APP HEADER — MOBILE ================= -->\n  <sc-if value=\"{{ showAppHeaderMobile }}\">\n    <header style=\"position:sticky; top:0; z-index:40; display:flex; align-items:center; justify-content:space-between; padding:14px 16px; background:hsl(38 45% 97% / 0.88); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px); border-bottom:1px solid hsl(30 20% 88% / 0.7);\">\n      <div style=\"display:flex; align-items:center; gap:10px; min-width:0;\">\n        <sc-if value=\"{{ showBackButton }}\">\n          <button onclick=\"{{ back }}\" style=\"width:34px; height:34px; border-radius:999px; border:none; background:hsl(30 20% 90%); display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; color:hsl(20 25% 13%);\">\n            <span style=\"font-family:'Material Symbols Outlined'; font-size:19px;\">arrow_back<\u002Fspan>\n          <\u002Fbutton>\n        <\u002Fsc-if>\n        <span style=\"font-family:'Sora'; font-weight:700; font-size:16.5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;\">{{ screenTitle }}<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex; align-items:center; gap:8px; flex-shrink:0;\">\n        <button onclick=\"{{ toggleNotifPanel }}\" style=\"position:relative; width:34px; height:34px; border-radius:999px; border:none; background:hsl(30 20% 90%); display:flex; align-items:center; justify-content:center; cursor:pointer; color:hsl(20 25% 13%);\">\n          <span style=\"font-family:'Material Symbols Outlined'; font-size:18px;\">notifications<\u002Fspan>\n          <span style=\"position:absolute; top:5px; right:6px; width:6px; height:6px; border-radius:999px; background:hsl(9 62% 46%);\"><\u002Fspan>\n        <\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fheader>\n  <\u002Fsc-if>\n\n  <!-- ================= NOTIFICATIONS PANEL (shared) ================= -->\n  <sc-if value=\"{{ notifPanelOpen }}\">\n    <div onclick=\"{{ closeNotifPanel }}\" style=\"position:fixed; inset:0; z-index:69; background:hsl(20 25% 13% / 0.25);\">\n      <div onclick=\"{{ stopClickPropagation }}\" style=\"position:absolute; top:64px; right:16px; left:16px; max-width:360px; margin-left:auto; background:hsl(30 45% 99%); border-radius:20px; border:1px solid hsl(30 20% 88%); box-shadow:0 30px 60px -24px hsl(20 40% 15% / 0.4); overflow:hidden;\">\n        <div style=\"padding:16px 18px; border-bottom:1px solid hsl(30 20% 90%); font-family:'Sora'; font-weight:700; font-size:15px;\">Notificações<\u002Fdiv>\n        <div style=\"max-height:340px; overflow-y:auto;\">\n          <sc-for list=\"{{ notifications }}\" as=\"n\" hint-placeholder-count=\"3\">\n            <div style=\"display:flex; gap:12px; padding:13px 18px; border-bottom:1px solid hsl(30 20% 93%);\">\n              <span style=\"width:36px; height:36px; border-radius:999px; background:{{ n.bg }}; color:white; display:flex; align-items:center; justify-content:center; flex-shrink:0;\">\n                <span style=\"font-family:'Material Symbols Outlined'; font-size:18px;\">{{ n.icon }}<\u002Fspan>\n              <\u002Fspan>\n              <div style=\"min-width:0;\">\n                <div style=\"font-size:13px; line-height:1.4; color:hsl(20 25% 13%);\">{{ n.text }}<\u002Fdiv>\n                <div style=\"font-size:11.5px; color:hsl(20 10% 55%); margin-top:2px;\">{{ n.time }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ================= MAIN CONTENT AREA ================= -->\n  <main style=\"{{ mainStyle }}\">\n\n    <!-- ========================================================= -->\n    <!-- SCREEN: HOME                                               -->\n    <!-- ========================================================= -->\n    <sc-if value=\"{{ isHome }}\" hint-placeholder-val=\"{{ true }}\">\n      <div data-screen-label=\"Home\" style=\"position:relative; overflow:hidden;\">\n        <!-- background texture -->\n        <div style=\"position:absolute; inset:0; pointer-events:none; background:radial-gradient(circle at 12% 8%, hsl(17 72% 80% / 0.5), transparent 32%), radial-gradient(circle at 88% 4%, hsl(40 88% 78% / 0.45), transparent 28%), linear-gradient(180deg, hsl(38 45% 97%), hsl(34 42% 95%) 60%, hsl(38 45% 97%));\"><\u002Fdiv>\n\n        <!-- HERO -->\n        <section style=\"position:relative; padding:56px 24px 64px; max-width:1180px; margin:0 auto;\">\n          <div style=\"display:grid; grid-template-columns:{{ heroGridColumns }}; gap:48px; align-items:center;\">\n            <div style=\"text-align:{{ heroTextAlign }};\">\n              <span style=\"display:inline-flex; align-items:center; gap:8px; height:34px; padding:0 16px; border-radius:999px; background:hsl(30 45% 99% / 0.85); border:1px solid hsl(30 20% 88%); font-size:12.5px; font-weight:700; color:hsl(20 25% 25%); box-shadow:0 12px 24px -18px hsl(20 40% 20% / 0.4); animation:vl-fadeUp 0.5s ease;\">\n                <span style=\"font-family:'Material Symbols Outlined'; font-size:16px; color:hsl(17 72% 45%);\">volunteer_activism<\u002Fspan>\n                Adoção responsável e gratuita\n              <\u002Fspan>\n              <h1 style=\"font-family:'Sora'; font-weight:800; letter-spacing:-0.03em; line-height:1.04; font-size:{{ heroTitleSize }}; margin:20px 0 0; animation:vl-fadeUp 0.5s ease 0.05s backwards;\">\n                Encontre seu\n                <span style=\"background:linear-gradient(100deg, hsl(14 55% 32%), hsl(17 72% 45%) 45%, hsl(40 88% 54%)); -webkit-background-clip:text; background-clip:text; color:transparent;\">companheiro<\u002Fspan>\n                ideal\n              <\u002Fh1>\n              <p style=\"font-size:17.5px; line-height:1.6; color:hsl(20 12% 40%); max-width:480px; margin:20px 0 0; {{ heroParagraphMargin }} animation:vl-fadeUp 0.5s ease 0.1s backwards;\">\n                O Viralata conecta pets que precisam de um lar com famílias que têm amor para dar — do primeiro match até o dia da adoção.\n              <\u002Fp>\n              <div style=\"display:flex; gap:12px; margin-top:28px; justify-content:{{ heroButtonsJustify }}; flex-wrap:wrap; animation:vl-fadeUp 0.5s ease 0.15s backwards;\">\n                <button onclick=\"{{ goFeed }}\" style=\"height:50px; padding:0 26px; border:none; border-radius:999px; background:linear-gradient(135deg, hsl(17 72% 45%), hsl(40 88% 54%)); color:white; font-family:'Manrope'; font-weight:700; font-size:15px; cursor:pointer; box-shadow:0 18px 36px -16px hsl(17 72% 30% / 0.65);\">Ver Pets para Adoção<\u002Fbutton>\n                <button onclick=\"{{ goLogin }}\" style=\"height:50px; padding:0 26px; border:2px solid hsl(17 72% 45% / 0.35); border-radius:999px; background:hsl(30 45% 99% / 0.8); color:hsl(20 25% 13%); font-family:'Manrope'; font-weight:700; font-size:15px; cursor:pointer;\">Cadastrar meu Pet<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <div style=\"{{ heroVisualWrapStyle }}\">\n              <div style=\"position:absolute; inset:14px; border-radius:44% 56% 58% 42% / 46% 42% 58% 54%; background:linear-gradient(135deg, hsl(17 72% 45% / 0.35), hsl(40 88% 54% / 0.3)); filter:blur(30px);\"><\u002Fdiv>\n              <div style=\"position:relative; height:100%; border-radius:40% 60% 55% 45% / 48% 44% 56% 52%; background:hsl(30 45% 99% / 0.85); border:1px solid white; backdrop-filter:blur(10px); display:flex; align-items:center; justify-content:center; box-shadow:0 30px 70px -30px hsl(20 40% 20% / 0.4); overflow:hidden;\">\n                <span style=\"font-family:'Material Symbols Outlined'; font-size:150px; color:hsl(17 72% 45% / 0.55);\">pets<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"position:absolute; left:-6px; top:22px; display:flex; align-items:center; gap:7px; height:36px; padding:0 14px; border-radius:999px; background:hsl(30 45% 99% / 0.95); border:1px solid hsl(30 20% 88%); font-size:12.5px; font-weight:700; box-shadow:0 16px 30px -18px hsl(20 40% 20% / 0.45); animation:vl-fadeUp 0.5s ease 0.4s backwards;\">\n                <span style=\"font-family:'Material Symbols Outlined'; font-size:16px; color:hsl(40 88% 44%);\">favorite<\u002Fspan> +500 adoções realizadas\n              <\u002Fdiv>\n              <div style=\"position:absolute; right:-4px; bottom:18px; display:flex; align-items:center; gap:7px; height:36px; padding:0 14px; border-radius:999px; background:hsl(30 45% 99% / 0.95); border:1px solid hsl(30 20% 88%); font-size:12.5px; font-weight:700; box-shadow:0 16px 30px -18px hsl(20 40% 20% / 0.45); animation:vl-fadeUp 0.5s ease 0.5s backwards;\">\n                <span style=\"font-family:'Material Symbols Outlined'; font-size:16px; color:hsl(17 72% 45%);\">check_circle<\u002Fspan> 100% sem custo\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsection>\n\n        <!-- IMPACT STATS -->\n        <section style=\"position:relative; max-width:1000px; margin:0 auto; padding:0 24px 72px;\">\n          <div style=\"display:grid; grid-template-columns:repeat({{ statsColumns }},1fr); gap:14px; background:hsl(30 45% 99% / 0.85); border:1px solid white; backdrop-filter:blur(10px); border-radius:28px; padding:28px 20px; box-shadow:0 24px 60px -34px hsl(20
