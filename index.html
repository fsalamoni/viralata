<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Viralata — plataforma gratuita de adoção responsável de pets no Brasil. Encontre pets para adoção, converse com ONGs e responsáveis, e cadastre pets com segurança." />
    <title>Viralata — Adoção Responsável de Pets</title>

    <!-- PWA: metadados de instalação (inertes sem o service worker, registrado por flag) -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#c1522a" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Viralata" />

    <!-- TASK-020: anti-FOUC dark mode. Aplica tema ANTES do React montar
         para evitar flash claro→escuro na primeira renderização. Lê do
         localStorage OU cai para prefers-color-scheme do sistema. -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('viralata-color-mode');
          var mode = (stored === 'dark' || stored === 'light') ? stored : 'system';
          var isDark = mode === 'dark'
            || (mode === 'system' && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (isDark) document.documentElement.classList.add('dark');
        } catch (_) {
          // localStorage indisponível (modo privado) — segue light.
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
