name: Security Audit (npm audit)

# Bloqueia PRs com vulnerabilidades high+ ou critical em dependências.
# Roda em PRs, push para main, e semanalmente (segunda 09:00 UTC).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 9 * * 1'

permissions:
  contents: read
  pull-requests: write

jobs:
  npm-audit:
    name: npm audit (severity >= high)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run npm audit
        id: audit
        continue-on-error: true
        env:
          GITHUB_OUTPUT: ${{ github.output }}
        run: bash .github/scripts/security-audit.sh

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: audit.json
          retention-days: 14
          if-no-files-found: ignore
