name: Deploy Viralata → Firebase Hosting

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Functions dependencies
        run: npm ci
        working-directory: functions

      - name: Run tests
        run: npm test -- --run --reporter=verbose
        continue-on-error: true

      - name: Run Functions tests
        run: npm test
        working-directory: functions
        continue-on-error: true

      - name: Build
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIRESTORE_DATABASE_ID: ${{ secrets.VITE_FIRESTORE_DATABASE_ID }}

      - name: Deploy to Firebase Hosting (Preview — PRs)
        if: github.event_name == 'pull_request'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: viralata-4cf0b
          channelId: pr-${{ github.event.pull_request.number }}

      - name: Deploy to Firebase Hosting (Production — main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: viralata-4cf0b
          channelId: live

      - name: Deploy Firestore rules/indexes & Storage rules (Production — main)
        if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/firebase-sa.json"
          npx firebase-tools@latest deploy --only firestore:rules,firestore:indexes,storage --project viralata-4cf0b --non-interactive
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-sa.json

      # Requer papéis de IAM adicionais na service account (além dos já usados
      # por Hosting/Firestore/Storage): Cloud Functions Admin, Cloud Build
      # Editor, Artifact Registry Administrator e Service Account User — e as
      # APIs Cloud Functions, Cloud Build, Artifact Registry e Eventarc
      # habilitadas no projeto. Isolado com `continue-on-error` para não
      # travar o restante do deploy caso essas permissões ainda não existam.
      - name: Deploy Cloud Functions (Production — main)
        if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        continue-on-error: true
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/firebase-sa.json"
          npx firebase-tools@latest deploy --only functions --project viralata-4cf0b --non-interactive
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-sa.json
