name: Redeploy Cloud Functions

# Workflow dedicada para re-deploy manual de Cloud Functions via
# workflow_dispatch. Útil quando o gateway do Cloud Functions fica
# em estado ruim (ex: OPTIONS preflight retornando 403 do Google
# Frontend) e um re-deploy limpa o estado.
#
# Trigger: aba "Actions" no GitHub → "Redeploy Cloud Functions" →
# "Run workflow" → seleciona o branch (sempre main).
#
# Por que workflow dedicada e não reusar deploy.yml?
#   - deploy.yml faz Hosting + Functions + Rules + Storage CORS. Rodar
#     tudo é overkill quando só Functions precisa ser re-deployado.
#   - Esta workflow só depende de Node + firebase-tools, mais rápida.
#   - Pode ser disparada por qualquer pessoa com write no repo,
#     sem precisar de push em main.

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to redeploy from (use main for production)'
        required: true
        default: 'main'
        type: choice
        options:
          - main

permissions:
  contents: read

jobs:
  redeploy_functions:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Functions dependencies
        run: npm ci
        working-directory: functions

      - name: Run Functions tests
        run: npm test
        working-directory: functions
        continue-on-error: true

      # CRÍTICO 1: mockData.js faz dynamic import de ./_payloads/index.js,
      # mas o Firebase Functions só deploya a pasta functions/. Sem este
      # passo, o runtime quebra com ERR_MODULE_NOT_FOUND e retorna 500.
      #
      # CRÍTICO 2: NÃO pode ser ./mocks/ — o firebase-tools@15 FILTRA
      # *.js em dirs chamados 'mocks' (convenção Jest test mocks) e
      # deleta tudo no upload. Já passei por isso. _payloads é seguro.
      #
      # CRÍTICO 3: src/mocks/ é ESM (import/export). functions/package.json
      # tem "type":"commonjs". Sem o package.json com "type":"module" no
      # diretório alvo, Node trata os arquivos como CJS e quebra com
      # "SyntaxError: Cannot use import statement outside a module".
      - name: Copy src/mocks into functions/_payloads as .mjs (predeploy)
        run: |
          mkdir -p functions/_payloads
          find functions/_payloads -type f -delete 2>/dev/null || true
          # IMPORTANTE: copiar como .mjs (NÃO .js)
          # O firebase-tools FILTRA arquivos .js em qualquer diretório que
          # tenha um package.json (mesmo com type:module). A extensão .mjs
          # força Node a tratar como ESM sem precisar de package.json,
          # e o firebase-tools não filtra .mjs.
          for f in src/mocks/*.js; do
            base=$(basename "$f" .js)
            cp "$f" "functions/_payloads/$base.mjs"
          done
          # Reescrever imports internos de './xxx.js' para './xxx.mjs'
          for f in functions/_payloads/*.mjs; do
            sed -i "s|from '\./\([a-zA-Z0-9_]*\)\.js'|from './\1.mjs'|g" "$f"
            sed -i 's|from "\./\([a-zA-Z0-9_]*\)\.js"|from "./\1.mjs"|g' "$f"
          done
          echo "=== Payloads copiados ==="
          ls -la functions/_payloads/

      - name: Redeploy Cloud Functions
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-sa.json
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/firebase-sa.json"
          npx firebase-tools@latest deploy \
            --only functions \
            --project viralata-4cf0b \
            --non-interactive \
            --force

      # callable v2 functions precisam explicitamente de IAM=allUsers
      # para que o gateway do Cloud Functions aceite preflight CORS.
      # Sem isso, OPTIONS volta 403 do Google Frontend e o client SDK
      # bloqueia com "blocked by CORS policy".
      - name: Grant invoker role to allUsers (v2 functions)
        if: always()
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-sa.json
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/firebase-sa.json"
          gcloud auth activate-service-account --key-file="$RUNNER_TEMP/firebase-sa.json" --project=viralata-4cf0b
          gcloud config set project viralata-4cf0b
          # v2 functions no Cloud Functions usam 'gcloud functions' com --gen2
          for FN in getMockStatus loadMockData clearMockData; do
            echo "--- $FN ---"
            gcloud functions add-invoker-policy-binding \
              --gen2 \
              --region=southamerica-east1 \
              --project=viralata-4cf0b \
              --member=allUsers \
              "$FN" 2>&1 | tail -3 || true
          done

      - name: Summary
        if: always()
        run: |
          echo "### Redeploy Cloud Functions" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Branch: \`${{ inputs.branch }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Result: **${{ job.status }}**" >> $GITHUB_STEP_SUMMARY
          echo "- Actor: @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- Run: #${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Se o status é ✅ success, o gateway do Cloud Functions foi" >> $GITHUB_STEP_SUMMARY
          echo "re-inicializado. Limpar cache do SW e hard-refresh no browser" >> $GITHUB_STEP_SUMMARY
          echo "para confirmar." >> $GITHUB_STEP_SUMMARY
