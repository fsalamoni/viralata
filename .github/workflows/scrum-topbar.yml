name: Scrum Topbar Auto-Update

on:
  push:
    branches: [main]
  schedule:
    - cron: '*/15 * * * *'  # a cada 15 min como backup

permissions:
  contents: write

concurrency:
  group: scrum-topbar
  cancel-in-progress: true

jobs:
  update-topbar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Re-embed métricas no painel
        run: |
          node .harness/sync.cjs --fix
          git diff --quiet public/scrum.html .harness/painel-scrum.html .harness/SCRUM_TASKS.json
          if [ $? -ne 0 ]; then
            echo "Mudanças detectadas, commitando..."
            MAIN_COMMIT=$(git rev-parse HEAD)
            MAIN_SHORT=$(echo $MAIN_COMMIT | cut -c1-7)
            git config user.name "viralata-scrum-bot"
            git config user.email "scrum-bot@viralata.local"
            git add public/scrum.html .harness/painel-scrum.html .harness/SCRUM_TASKS.json
            git commit -m "chore(scrum): sync.cjs --fix re-embed métricas (${MAIN_SHORT})"
            git push origin main
          else
            echo "Sem mudanças nas métricas"
          fi
