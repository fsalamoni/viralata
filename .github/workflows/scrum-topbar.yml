name: Scrum Topbar Auto-Update

on:
  push:
    branches: [main]
  workflow_run:
    workflows: ["Sync Scrum Dashboard"]
    types: [completed]
  schedule:
    - cron: '*/15 * * * *'  # a cada 15 min como backup

permissions:
  contents: write

concurrency:
  group: scrum-topbar
  cancel-in-progress: true

jobs:
  update-topbar:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Update topbar with sed
        run: |
          MAIN_COMMIT=$(git rev-parse HEAD)
          MAIN_SHORT=$(echo $MAIN_COMMIT | cut -c1-7)
          WT_COUNT=$(git worktree list --porcelain 2>/dev/null | grep -c "^worktree" || echo 0)
          WT_COUNT=$((WT_COUNT - 1))
          WT_TXT="0 worktrees ativos"
          if [ "$WT_COUNT" -gt 0 ]; then
            if [ "$WT_COUNT" -gt 1 ]; then
              WT_TXT="+${WT_COUNT} worktrees ativos"
            else
              WT_TXT="+1 worktree ativo"
            fi
          fi
          echo "Main: $MAIN_SHORT · Worktrees: $WT_COUNT"
          for f in public/scrum.html .harness/painel-scrum.html; do
            if [ -f "$f" ]; then
              sed -i "s|<span class=\"pill mono\">main @ [0-9a-f]\{7\}</span>|<span class=\"pill mono\">main @ ${MAIN_SHORT}</span>|" "$f"
              sed -i "s|<span class=\"pill\">[+]\?[0-9]\+ worktrees\? ativos\?</span>|<span class=\"pill\">${WT_TXT}</span>|" "$f"
            fi
          done
          if git diff --quiet public/scrum.html .harness/painel-scrum.html; then
            echo "Sem mudanças no topbar"
          else
            git config user.name "viralata-scrum-bot"
            git config user.email "scrum-bot@viralata.local"
            git add public/scrum.html .harness/painel-scrum.html
            git commit -m "chore(scrum): topbar auto-update ${MAIN_SHORT} (workflow)"
            git push origin main
          fi
