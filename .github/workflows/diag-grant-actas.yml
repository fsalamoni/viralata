name: "Diag: Deploy Functions via Cloud Run source"

on: workflow_dispatch

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Prepare functions dir
        run: |
          mkdir -p functions/mocks
          cp src/mocks/*.js functions/mocks/
          echo "=== files in functions/ ==="
          ls functions/
          echo "=== files in functions/mocks/ ==="
          ls functions/mocks/

      - name: Try gcloud run services update
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT" > /tmp/firebase-sa.json
          gcloud auth activate-service-account --key-file=/tmp/firebase-sa.json --project=viralata-4cf0b
          gcloud config set project viralata-4cf0b
          # Tentar deployar via gcloud run com --source (não precisa ActAs)
          for FN in getMockStatus loadMockData clearMockData; do
            echo "=== $FN ==="
            gcloud run services update "$FN" \
              --source=functions \
              --region=southamerica-east1 \
              --project=viralata-4cf0b 2>&1 | tail -10
          done
