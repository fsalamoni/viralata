name: "Diag: Find function source bucket"

on: workflow_dispatch

permissions:
  contents: read
  id-token: write

jobs:
  find:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Auth
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT" > /tmp/firebase-sa.json
          gcloud auth activate-service-account --key-file=/tmp/firebase-sa.json --project=viralata-4cf0b
          gcloud config set project viralata-4cf0b

      - name: Describe function
        run: |
          echo "=== gcloud functions describe getMockStatus ==="
          gcloud functions describe getMockStatus \
            --region=southamerica-east1 \
            --gen2 \
            --project=viralata-4cf0b 2>&1 | head -80

      - name: List Cloud Run services
        run: |
          echo "=== Cloud Run services ==="
          gcloud run services list --region=southamerica-east1 --project=viralata-4cf0b 2>&1

      - name: Describe Cloud Run service
        run: |
          echo "=== getmockstatus (Cloud Run) ==="
          gcloud run services describe getmockstatus \
            --region=southamerica-east1 \
            --project=viralata-4cf0b 2>&1 | head -80
