name: "Diag: Extract NEW function image"

on: workflow_dispatch

permissions:
  contents: read
  id-token: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Auth + pull NEW image
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT" > /tmp/firebase-sa.json
          gcloud auth activate-service-account --key-file=/tmp/firebase-sa.json --project=viralata-4cf0b
          gcloud config set project viralata-4cf0b
          gcloud auth configure-docker southamerica-east1-docker.pkg.dev --quiet 2>&1
          # A NOVA imagem (do redeploy #11 que rodou agora)
          NEW_IMAGE="southamerica-east1-docker.pkg.dev/viralata-4cf0b/gcf-artifacts/viralata--4cf0b__southamerica--east1__on_pet_created_notify_radar@sha256:26ad44680710d08c2a55181eb9ddd8b7682557cbfc13e8e810e6def3c918ae5f"
          docker pull "$NEW_IMAGE" 2>&1 | tail -3
          CONTAINER=$(docker create "$NEW_IMAGE")
          echo "=== Files in /workspace (NEW IMAGE) ==="
          docker cp "$CONTAINER:/workspace" - 2>/dev/null | tar -tv 2>&1 | grep -E "payloads|mocks|mockData.js" | head -20
          echo ""
          echo "=== mockData.js content (verify new path) ==="
          docker cp "$CONTAINER:/workspace/mockData.js" - 2>/dev/null | head -60
          echo ""
          echo "=== Functions tests after import resolved? ==="
          docker run --rm "$NEW_IMAGE" node -e "const f=require('/workspace/mockData.js'); console.log('loaded:', typeof f);" 2>&1 | head -10
          docker rm "$CONTAINER" 2>&1 | head -2
