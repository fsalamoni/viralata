name: "Diag: Grant ActAs + Deploy Functions"

on: workflow_dispatch

permissions:
  contents: read
  id-token: write

jobs:
  grant:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Auth + grant ActAs
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT" > /tmp/firebase-sa.json
          gcloud auth activate-service-account --key-file=/tmp/firebase-sa.json --project=viralata-4cf0b
          gcloud config set project viralata-4cf0b
          gcloud iam service-accounts add-iam-policy-binding \
            viralata-4cf0b@appspot.gserviceaccount.com \
            --member="serviceAccount:firebase-adminsdk-fbsvc@viralata-4cf0b.iam.gserviceaccount.com" \
            --role="roles/iam.serviceAccountUser" \
            --project=viralata-4cf0b 2>&1 | head -20

      - name: Copy mocks + Deploy functions
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/firebase-sa.json
        run: |
          mkdir -p functions/mocks
          cp src/mocks/*.js functions/mocks/
          echo "=== Mocks copiados ==="
          ls functions/mocks/
          npx firebase-tools@latest deploy \
            --only functions \
            --project viralata-4cf0b \
            --non-interactive \
            --force 2>&1 | tail -30
