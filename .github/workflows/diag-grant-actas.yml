name: "Diag: List ALL function revisions and check latest image"

on: workflow_dispatch

permissions:
  contents: read
  id-token: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Auth + gcloud
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT" > /tmp/firebase-sa.json
          gcloud auth activate-service-account --key-file=/tmp/firebase-sa.json --project=viralata-4cf0b
          gcloud config set project viralata-4cf0b

      - name: List ALL revisions (newest first)
        run: |
          echo "=== getmockstatus revisions ==="
          gcloud run revisions list \
            --service=getmockstatus \
            --region=southamerica-east1 \
            --project=viralata-4cf0b \
            --sort-by=~createTime \
            --format="table(name,createTime,image,trafficPercent)" 2>&1 | head -20

      - name: List ALL artifacts (images)
        run: |
          echo "=== All function images in artifact registry ==="
          gcloud artifacts docker images list \
            "southamerica-east1-docker.pkg.dev/viralata-4cf0b/gcf-artifacts" \
            --include-tags \
            --project=viralata-4cf0b 2>&1 | head -30
