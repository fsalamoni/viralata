name: "Diag: Deploy Functions w/ gcloud using default SA"

on: workflow_dispatch

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Prepare functions dir
        run: |
          mkdir -p functions/mocks
          cp src/mocks/*.js functions/mocks/

      - name: Deploy
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT" > /tmp/firebase-sa.json
          gcloud auth activate-service-account --key-file=/tmp/firebase-sa.json --project=viralata-4cf0b
          gcloud config set project viralata-4cf0b
          # NÃO set --service-account — usar o default (appspot)
          for FN in getMockStatus loadMockData clearMockData; do
            echo "=== $FN ==="
            gcloud functions deploy "$FN" \
              --gen2 \
              --region=southamerica-east1 \
              --runtime=nodejs20 \
              --source=functions \
              --entry-point="$FN" \
              --trigger-http \
              --no-allow-unauthenticated \
              --project=viralata-4cf0b 2>&1 | tail -20
          done
