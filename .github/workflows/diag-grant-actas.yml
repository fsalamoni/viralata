name: "Diag: List pets/users in Firestore directly"

on: workflow_dispatch

permissions:
  contents: read
  id-token: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: List collections via Firestore REST
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT" > /tmp/firebase-sa.json
          ACCESS_TOKEN=$(node -e "const {google}=require('google-auth-library');const fs=require('fs');const key=JSON.parse(fs.readFileSync('/tmp/firebase-sa.json','utf8'));const c=new google.auth.JWT({email:key.client_email,key:key.private_key,scopes:['https://www.googleapis.com/auth/cloud-platform']});c.authorize().then(()=>c.getAccessToken().then(t=>process.stdout.write(t.token)));" 2>&1 | tail -1)
          echo "Token: ${ACCESS_TOKEN:0:30}..."

          for COLL in pets users communities clubs; do
            echo ""
            echo "=== $COLL (first 15) ==="
            curl -s -H "Authorization: Bearer $ACCESS_TOKEN" "https://firestore.googleapis.com/v1/projects/viralata-4cf0b/databases/viralata/documents/$COLL?pageSize=15" > /tmp/out.json
            cat > /tmp/parse.py << 'INNER'
import json, sys
coll = sys.argv[1]
d = json.load(open('/tmp/out.json'))
if 'documents' in d:
    print('Found ' + str(len(d['documents'])) + ' ' + coll)
    for doc in d['documents'][:15]:
        fields = doc.get('fields', {})
        doc_id = doc['name'].split('/')[-1]
        keys = ['title', 'name', 'display_name', 'label']
        name = '?'
        for k in keys:
            v = fields.get(k, {}).get('stringValue')
            if v:
                name = v
                break
        status = fields.get('status', {}).get('stringValue', '')
        city = fields.get('city', {}).get('stringValue', '')
        state = fields.get('state', {}).get('stringValue', '')
        owner_id = fields.get('owner_id', {}).get('stringValue', '')
        print('  ' + doc_id + ' | ' + name + ' | ' + status + ' | ' + city + ' | ' + state + ' | ' + owner_id)
else:
    print('ERROR:', d)
INNER
            python3 /tmp/parse.py "$COLL"
          done
