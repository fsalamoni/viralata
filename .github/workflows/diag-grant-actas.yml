name: "Diag: List pets/users in Firestore directly"

on: workflow_dispatch

permissions:
  contents: read
  id-token: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: List pets via Firestore REST
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT" > /tmp/firebase-sa.json
          ACCESS_TOKEN=$(node -e "
            const {google} = require('google-auth-library');
            const fs = require('fs');
            const key = JSON.parse(fs.readFileSync('/tmp/firebase-sa.json', 'utf8'));
            const jwtClient = new google.auth.JWT({
              email: key.client_email,
              key: key.private_key,
              scopes: ['https://www.googleapis.com/auth/cloud-platform'],
            });
            jwtClient.authorize().then(() => {
              jwtClient.getAccessToken().then(t => process.stdout.write(t.token));
            });
          " 2>&1 | tail -1)
          echo "Token ok: ${ACCESS_TOKEN:0:30}..."

          echo ""
          echo "=== Pets (limit 20) ==="
          curl -s -H "Authorization: Bearer $ACCESS_TOKEN" \
            "https://firestore.googleapis.com/v1/projects/viralata-4cf0b/databases/viralata/documents/pets?pageSize=20" > /tmp/pets.json
          python3 -c "
import json
d = json.load(open('/tmp/pets.json'))
if 'documents' in d:
  print(f'Found {len(d[\"documents\"])} pets')
  for p in d['documents']:
    fields = p.get('fields', {})
    name = fields.get('title', {}).get('stringValue', '?')
    species = fields.get('species', {}).get('stringValue', '?')
    status = fields.get('status', {}).get('stringValue', '?')
    city = fields.get('city', {}).get('stringValue', '?')
    state = fields.get('state', {}).get('stringValue', '?')
    print(f'  {name:<15} {species:<10} {status:<12} {city:<20} {state}')
else:
  print(d)
"

          echo ""
          echo "=== Users (first 5) ==="
          curl -s -H "Authorization: Bearer $ACCESS_TOKEN" \
            "https://firestore.googleapis.com/v1/projects/viralata-4cf0b/databases/viralata/documents/users?pageSize=5" > /tmp/users.json
          python3 -c "
import json
d = json.load(open('/tmp/users.json'))
if 'documents' in d:
  print(f'Found {len(d[\"documents\"])} users (first 5)')
  for u in d['documents'][:5]:
    fields = u.get('fields', {})
    name = fields.get('display_name', {}).get('stringValue', '?')
    email = fields.get('email', {}).get('stringValue', '?')
    city = fields.get('city', {}).get('stringValue', '?')
    print(f'  {name:<25} {email:<35} {city}')
else:
  print(d)
"
