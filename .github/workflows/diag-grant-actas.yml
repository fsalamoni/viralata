name: "Diag: Verify what's in the function container"

on: workflow_dispatch

permissions:
  contents: read
  id-token: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Auth + gcloud
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT" > /tmp/firebase-sa.json
          gcloud auth activate-service-account --key-file=/tmp/firebase-sa.json --project=viralata-4cf0b
          gcloud config set project viralata-4cf0b

      - name: Get latest revision URL
        run: |
          gcloud run revisions list \
            --service=getmockstatus \
            --region=southamerica-east1 \
            --project=viralata-4cf0b \
            --format="table(name,createTime,image)" 2>&1 | head -10

      - name: Get function source archive URL
        run: |
          # List source archives in gcf-v2-sources-* buckets
          gcloud storage ls "gs://gcf-v2-sources-*-viralata-4cf0b" --project=viralata-4cf0b 2>&1 | head -20

      - name: Look at source archive contents
        run: |
          LATEST=$(gcloud storage ls "gs://gcf-v2-sources-*-viralata-4cf0b" --project=viralata-4cf0b 2>&1 | sort | tail -1)
          echo "=== Latest source: $LATEST ==="
          gcloud storage cp "$LATEST" /tmp/func-source.zip 2>&1
          echo "=== Files in source archive ==="
          unzip -l /tmp/func-source.zip 2>&1 | head -50
