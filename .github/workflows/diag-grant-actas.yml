name: "Diag: Inspect function container image"

on: workflow_dispatch

permissions:
  contents: read
  id-token: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Auth + gcloud
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT" > /tmp/firebase-sa.json
          gcloud auth activate-service-account --key-file=/tmp/firebase-sa.json --project=viralata-4cf0b
          gcloud config set project viralata-4cf0b

      - name: Pull and inspect image
        run: |
          gcloud auth configure-docker southamerica-east1-docker.pkg.dev --quiet 2>&1
          docker pull "southamerica-east1-docker.pkg.dev/viralata-4cf0b/gcf-artifacts/viralata--4cf0b__southamerica--east1__on_pet_created_notify_radar@sha256:f2fc632c6be938dc59e5440c110120a40e26ada7f327c4e93c9a40516a826a8b" 2>&1 | tail -5
          echo "=== Files in /workspace ==="
          docker run --rm "southamerica-east1-docker.pkg.dev/viralata-4cf0b/gcf-artifacts/viralata--4cf0b__southamerica--east1__on_pet_created_notify_radar@sha256:f2fc632c6be938dc59e5440c110120a40e26ada7f327c4e93c9a40516a826a8b" ls -la /workspace 2>&1 | head -30
          echo "=== Files in /workspace/mocks (if exists) ==="
          docker run --rm "southamerica-east1-docker.pkg.dev/viralata-4cf0b/gcf-artifacts/viralata--4cf0b__southamerica--east1__on_pet_created_notify_radar@sha256:f2fc632c6be938dc59e5440c110120a40e26ada7f327c4e93c9a40516a826a8b" ls -la /workspace/mocks 2>&1 | head -30
          echo "=== mockData.js content (verify new path) ==="
          docker run --rm "southamerica-east1-docker.pkg.dev/viralata-4cf0b/gcf-artifacts/viralata--4cf0b__southamerica--east1__on_pet_created_notify_radar@sha256:f2fc632c6be938dc59e5440c110120a40e26ada7f327c4e93c9a40516a826a8b" cat /workspace/mockData.js 2>&1 | head -50
