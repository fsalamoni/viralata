name: "Diag: Grant ActAs at PROJECT level"

on: workflow_dispatch

permissions:
  contents: read
  id-token: write

jobs:
  grant:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Auth + grant
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT" > /tmp/firebase-sa.json
          gcloud auth activate-service-account --key-file=/tmp/firebase-sa.json --project=viralata-4cf0b
          gcloud config set project viralata-4cf0b

          # Tentar dar o role de Service Account User no project inteiro
          # (cobre qualquer SA no project)
          echo "=== Grant Service Account User at project level ==="
          gcloud projects add-iam-policy-binding viralata-4cf0b \
            --member="serviceAccount:firebase-adminsdk-fbsvc@viralata-4cf0b.iam.gserviceaccount.com" \
            --role="roles/iam.serviceAccountUser" 2>&1 | head -20

          # Tentar também iam.serviceAccountAdmin
          echo "=== Grant Service Account Admin at project level ==="
          gcloud projects add-iam-policy-binding viralata-4cf0b \
            --member="serviceAccount:firebase-adminsdk-fbsvc@viralata-4cf0b.iam.gserviceaccount.com" \
            --role="roles/iam.serviceAccountAdmin" 2>&1 | head -20
