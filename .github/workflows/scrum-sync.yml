name: Sync Scrum Dashboard

# Roda:
# - A cada push em main (auto-sync após cada merge)
# - Manualmente (workflow_dispatch)
# - Diariamente (scheduled, backup)

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 12 * * *'  # 09:00 BRT (12:00 UTC)

permissions:
  contents: write

jobs:
  sync-scrum:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run sync (rewrites public/scrum.html + commits back)
        run: |
          node .harness/sync.cjs --fix
          # FORÇAR update do topbar com main @ atual e worktree count
          # (independente do que o sync.cjs fez)
          MAIN_COMMIT=$(git rev-parse HEAD)
          MAIN_SHORT=$(echo $MAIN_COMMIT | cut -c1-7)
          WT_COUNT=$(git worktree list | wc -l)
          # -1 porque a primeira linha é o main worktree
          WT_COUNT=$((WT_COUNT - 1))
          WT_TXT="0 worktrees ativos"
          if [ "$WT_COUNT" -gt 0 ]; then
            WT_TXT="+${WT_COUNT} worktree"
            if [ "$WT_COUNT" -gt 1 ]; then
              WT_TXT="${WT_TXT}s ativo${WT_COUNT}s"
            else
              WT_TXT="${WT_TXT} ativo"
            fi
          fi
          sed -i 's|<span class="pill mono">main @ [0-9a-f]\{7\}</span>|<span class="pill mono">main @ '${MAIN_SHORT}'</span>|' public/scrum.html
          sed -i 's|<span class="pill">[+]\?[0-9]\+ worktrees\? ativos\?</span>|<span class="pill">'${WT_TXT}'</span>|' public/scrum.html
          # Se o public/scrum.html mudou, commit + push
          if git diff --quiet public/scrum.html; then
            echo "sem mudanças em public/scrum.html"
          else
            git config user.name "viralata-scrum-bot"
            git config user.email "scrum-bot@viralata.local"
            git add public/scrum.html
            git commit -m "chore(scrum): auto-sync $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            git push origin main
          fi
