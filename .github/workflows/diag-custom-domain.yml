name: "Diag: Check custom domain status"

on: workflow_dispatch

permissions:
  contents: read
  id-token: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: viralata-4cf0b
          service_account_key: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          export_default_credentials: true

      - name: Check custom domain
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT" > /tmp/firebase-sa.json
          ACCESS_TOKEN=$(node -e "const {google}=require('google-auth-library');const fs=require('fs');const key=JSON.parse(fs.readFileSync('/tmp/firebase-sa.json','utf8'));const c=new google.auth.JWT({email:key.client_email,key:key.private_key,scopes:['https://www.googleapis.com/auth/cloud-platform']});c.authorize().then(()=>c.getAccessToken().then(t=>process.stdout.write(t.token)));" 2>&1 | tail -1)
          gcloud config set project viralata-4cf0b
          echo "=== Firebase Hosting sites (cloud-platform scope) ==="
          curl -s -H "Authorization: Bearer $ACCESS_TOKEN" "https://firebasehosting.googleapis.com/v1beta1/projects/viralata-4cf0b/sites" 2>&1 | head -100
          echo ""
          echo "=== Custom domains ==="
          curl -s -H "Authorization: Bearer $ACCESS_TOKEN" "https://firebasehosting.googleapis.com/v1beta1/projects/viralata-4cf0b/sites/viralata/customDomains" 2>&1
          echo ""
          echo "=== Site viralata details ==="
          curl -s -H "Authorization: Bearer $ACCESS_TOKEN" "https://firebasehosting.googleapis.com/v1beta1/projects/viralata-4cf0b/sites/viralata" 2>&1
