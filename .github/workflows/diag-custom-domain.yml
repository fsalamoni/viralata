name: "Diag: List custom domains via gcloud (with --quiet)"

on: workflow_dispatch

permissions:
  contents: read
  id-token: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: viralata-4cf0b
          service_account_key: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          export_default_credentials: true

      - name: Use gcloud to inspect hosting
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          gcloud config set project viralata-4cf0b
          echo "$FIREBASE_SERVICE_ACCOUNT" > /tmp/sa.json
          gcloud auth activate-service-account --key-file=/tmp/sa.json --quiet 2>&1 | tail -3
          gcloud config set auth/credential_file_override /tmp/sa.json

          echo ""
          echo "=== firebase hosting sites ==="
          gcloud firebase hosting sites list --quiet 2>&1 | head -20 || true

          echo ""
          echo "=== List custom domains via gcloud (alpha) ==="
          gcloud alpha firebase hosting custom-domains list --site=viralata --quiet 2>&1 | head -50 || true

          echo ""
          echo "=== Describe custom domain viralata.app ==="
          gcloud alpha firebase hosting custom-domains describe viralata.app --site=viralata --quiet 2>&1 | head -30 || true

          echo ""
          echo "=== Describe site viralata ==="
          gcloud alpha firebase hosting sites describe viralata --quiet 2>&1 | head -30 || true
