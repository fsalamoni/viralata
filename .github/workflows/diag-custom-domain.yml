name: "Diag: Inspect hosting via firebase-tools + REST API"

on: workflow_dispatch

permissions:
  contents: read
  id-token: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use firebase-tools to inspect hosting
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT" > /tmp/sa.json
          cd "$GITHUB_WORKSPACE"
          npm install --silent google-auth-library 2>&1 | tail -3 || true

          ACCESS_TOKEN=$(node .github/scripts/get_access_token.cjs 2>/dev/null)
          echo "Token ok: ${ACCESS_TOKEN:0:30}..."

          echo ""
          echo "=== Firebase Hosting sites ==="
          curl -s -H "Authorization: Bearer $ACCESS_TOKEN" "https://firebasehosting.googleapis.com/v1beta1/projects/viralata-4cf0b/sites" 2>&1 | head -80
          echo ""
          echo "=== Custom domains for site viralata ==="
          curl -s -H "Authorization: Bearer $ACCESS_TOKEN" "https://firebasehosting.googleapis.com/v1beta1/projects/viralata-4cf0b/sites/viralata/customDomains" 2>&1 | head -200
          echo ""
          echo "=== viralata.app specific ==="
          curl -s -H "Authorization: Bearer $ACCESS_TOKEN" "https://firebasehosting.googleapis.com/v1beta1/projects/viralata-4cf0b/sites/viralata/customDomains/viralata.app" 2>&1 | head -100
