name: "Diag: Inspect hosting via firebase-tools CLI"

on: workflow_dispatch

permissions:
  contents: read
  id-token: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use firebase-tools to inspect hosting
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT" > /tmp/sa.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa.json
          export FIREBASE_TOKEN=""  # Use service account instead

          # install firebase-tools
          npm install -g firebase-tools@latest 2>&1 | tail -3

          echo ""
          echo "=== firebase login:ci (using sa) ==="
          # Alternative: use --use-ssa from local project config
          firebase login --use-localhost 2>&1 | head -10 || true

          echo ""
          echo "=== firebase projects:list ==="
          firebase projects:list 2>&1 | head -10

          echo ""
          echo "=== firebase hosting:channel:list ==="
          firebase hosting:channel:list --project=viralata-4cf0b --site=viralata 2>&1 | head -20

          echo ""
          echo "=== Try to read site via deploy-targets (the only way) ==="
          firebase target --project=viralata-4cf0b 2>&1 | head -20
