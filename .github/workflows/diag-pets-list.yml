name: "Diag: Show all available pets with coords"

on: workflow_dispatch

permissions:
  contents: read
  id-token: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run script
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT" > /tmp/sa.json
          cd "$GITHUB_WORKSPACE"
          npm install --silent firebase-admin 2>&1 | tail -3
          node .github/scripts/list_firestore_sdk.cjs pets

          echo ""
          echo "=== count by status ==="
          node -e "
const fs = require('fs');
process.env.GOOGLE_APPLICATION_CREDENTIALS = '/tmp/sa.json';
const { initializeApp, cert } = require('firebase-admin/app');
const { Firestore } = require('firebase-admin/firestore');
const sa = JSON.parse(fs.readFileSync('/tmp/sa.json', 'utf8'));
initializeApp({ credential: cert(sa) });
const db = new Firestore({ databaseId: 'viralata' });
(async () => {
  const all = await db.collection('pets').get();
  const byStatus = {};
  const byCity = {};
  for (const d of all.docs) {
    const s = d.data().status || '?';
    byStatus[s] = (byStatus[s] || 0) + 1;
    const c = (d.data().city || '?') + '/' + (d.data().state || '?');
    byCity[c] = (byCity[c] || 0) + 1;
  }
  console.log('Total:', all.size);
  console.log('By status:', JSON.stringify(byStatus, null, 2));
  console.log('By city/state:', JSON.stringify(byCity, null, 2));
  process.exit(0);
})();
"
