name: Deploy Firebase Hosting

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: firebase-hosting
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
      FIRESTORE_DATABASE_ID: pickleball
      FIRESTORE_LOCATION: southamerica-east1
      VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
      VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
      VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
      VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
      VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
      VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
      VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
      VITE_FIRESTORE_DATABASE_ID: pickleball
      VITE_ENABLE_FIREBASE_ANALYTICS: 'false'
      VITE_ENABLE_FIREBASE_PERFORMANCE: 'false'
      VITE_BASE_PATH: /
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Validate required secrets
        run: |
          required_vars=(
            FIREBASE_PROJECT_ID
            VITE_FIREBASE_API_KEY
            VITE_FIREBASE_AUTH_DOMAIN
            VITE_FIREBASE_STORAGE_BUCKET
            VITE_FIREBASE_MESSAGING_SENDER_ID
            VITE_FIREBASE_APP_ID
          )
          for var_name in "${required_vars[@]}"; do
            if [ -z "${!var_name}" ]; then
              echo "::error title=Missing secret::Configure ${var_name} in repository Settings > Secrets and variables > Actions."
              exit 1
            fi
          done
          if [ -z "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}" ]; then
            echo "::error title=Missing secret::Configure FIREBASE_SERVICE_ACCOUNT (JSON of a service account with deploy permissions)."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@13

      - name: Write service account credentials
        run: |
          printf '%s' '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > "$RUNNER_TEMP/firebase-sa.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/firebase-sa.json" >> "$GITHUB_ENV"

      - name: Ensure Firestore database "pickleball" exists
        run: |
          set -e
          if firebase firestore:databases:get "$FIRESTORE_DATABASE_ID" --project "$FIREBASE_PROJECT_ID" >/dev/null 2>&1; then
            echo "Firestore database '$FIRESTORE_DATABASE_ID' already exists."
          else
            echo "Creating Firestore database '$FIRESTORE_DATABASE_ID' in $FIRESTORE_LOCATION..."
            firebase firestore:databases:create "$FIRESTORE_DATABASE_ID" \
              --location "$FIRESTORE_LOCATION" \
              --project "$FIREBASE_PROJECT_ID" \
              --type firestore-native
          fi

      - name: Ensure Hosting site "pickletour" exists
        run: |
          set -e
          if firebase hosting:sites:get pickletour --project "$FIREBASE_PROJECT_ID" >/dev/null 2>&1; then
            echo "Hosting site 'pickletour' already exists."
          else
            echo "Creating hosting site 'pickletour'..."
            firebase hosting:sites:create pickletour --project "$FIREBASE_PROJECT_ID"
          fi
          firebase target:apply hosting pickletour pickletour --project "$FIREBASE_PROJECT_ID"

      - name: Build production bundle
        run: npm run build

      - name: Deploy Firestore rules and indexes
        run: |
          firebase deploy \
            --only "firestore:pickleball" \
            --project "$FIREBASE_PROJECT_ID" \
            --non-interactive

      - name: Deploy Firebase Hosting
        run: |
          firebase deploy \
            --only "hosting:pickletour" \
            --project "$FIREBASE_PROJECT_ID" \
            --non-interactive \
            --message "Deploy from GitHub Actions @ ${{ github.sha }}"
