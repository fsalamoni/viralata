name: Deploy Firebase Hosting

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: firebase-hosting
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
      FIRESTORE_DATABASE_ID: pickleball
      FIRESTORE_LOCATION: southamerica-east1
      HOSTING_SITE_ID: pickletour
      VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
      VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
      VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
      VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
      VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
      VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
      VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
      VITE_FIRESTORE_DATABASE_ID: pickleball
      VITE_ENABLE_FIREBASE_ANALYTICS: 'false'
      VITE_ENABLE_FIREBASE_PERFORMANCE: 'false'
      VITE_BASE_PATH: /
      # PWA habilitado: app instalável (Android/iOS) direto do site, sem lojas.
      VITE_PWA_ENABLED: 'true'
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Validate required secrets
        run: |
          required_vars=(
            FIREBASE_PROJECT_ID
            VITE_FIREBASE_API_KEY
            VITE_FIREBASE_AUTH_DOMAIN
            VITE_FIREBASE_STORAGE_BUCKET
            VITE_FIREBASE_MESSAGING_SENDER_ID
            VITE_FIREBASE_APP_ID
          )
          missing=0
          for var_name in "${required_vars[@]}"; do
            if [ -z "${!var_name}" ]; then
              echo "::error title=Missing secret::Configure ${var_name} in Settings > Secrets and variables > Actions."
              missing=1
            fi
          done
          if [ -z "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}" ]; then
            echo "::error title=Missing secret::Configure FIREBASE_SERVICE_ACCOUNT (full JSON of a service account with deploy permissions)."
            missing=1
          fi
          [ "$missing" -eq 0 ] || exit 1

      - name: Install dependencies
        run: npm ci

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@latest

      - name: Write service account credentials
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          SA_FILE="$RUNNER_TEMP/firebase-sa.json"
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$SA_FILE"
          if ! jq -e . "$SA_FILE" >/dev/null 2>&1; then
            echo "::error title=Bad service account::FIREBASE_SERVICE_ACCOUNT is not valid JSON. Paste the entire downloaded service-account .json file as the secret value."
            exit 1
          fi
          SA_EMAIL=$(jq -r '.client_email // empty' "$SA_FILE")
          SA_PROJECT=$(jq -r '.project_id // empty' "$SA_FILE")
          if [ -z "$SA_EMAIL" ]; then
            echo "::error title=Bad service account::client_email missing from FIREBASE_SERVICE_ACCOUNT JSON."
            exit 1
          fi
          echo "Service account: $SA_EMAIL"
          echo "Service account project: $SA_PROJECT"
          echo "Target Firebase project: $FIREBASE_PROJECT_ID"
          if [ -n "$SA_PROJECT" ] && [ "$SA_PROJECT" != "$FIREBASE_PROJECT_ID" ]; then
            echo "::warning title=Project mismatch::Service account belongs to '$SA_PROJECT' but VITE_FIREBASE_PROJECT_ID is '$FIREBASE_PROJECT_ID'. Cross-project deploys only work if the SA has roles on the target project."
          fi
          echo "GOOGLE_APPLICATION_CREDENTIALS=$SA_FILE" >> "$GITHUB_ENV"
          echo "SA_EMAIL=$SA_EMAIL" >> "$GITHUB_ENV"

      - name: Ensure Firestore database "pickleball" exists
        run: |
          set +e
          GET_OUT=$(firebase firestore:databases:get "$FIRESTORE_DATABASE_ID" --project "$FIREBASE_PROJECT_ID" 2>&1)
          GET_RC=$?
          if [ $GET_RC -eq 0 ]; then
            echo "Firestore database '$FIRESTORE_DATABASE_ID' already exists. OK."
            exit 0
          fi
          echo "Firestore database '$FIRESTORE_DATABASE_ID' not visible (rc=$GET_RC):"
          echo "$GET_OUT"
          echo "Attempting to create '$FIRESTORE_DATABASE_ID' in $FIRESTORE_LOCATION..."
          CREATE_OUT=$(firebase firestore:databases:create "$FIRESTORE_DATABASE_ID" --location "$FIRESTORE_LOCATION" --project "$FIREBASE_PROJECT_ID" 2>&1)
          CREATE_RC=$?
          echo "$CREATE_OUT"
          if [ $CREATE_RC -eq 0 ]; then
            echo "Created Firestore database '$FIRESTORE_DATABASE_ID'."
            exit 0
          fi
          if echo "$CREATE_OUT" | grep -qiE "already exists|ALREADY_EXISTS"; then
            echo "Database already exists (concurrent create). OK."
            exit 0
          fi
          if echo "$CREATE_OUT" | grep -qiE "HTTP Error: 403|PERMISSION_DENIED|caller does not have permission"; then
            echo "::error title=Missing IAM permission for Firestore database create::Service account '$SA_EMAIL' cannot create Firestore database '$FIRESTORE_DATABASE_ID' in project '$FIREBASE_PROJECT_ID'. Grant role 'Firebase Admin' (roles/firebase.admin) at https://console.cloud.google.com/iam-admin/iam?project=$FIREBASE_PROJECT_ID OR create the database manually at https://console.firebase.google.com/project/$FIREBASE_PROJECT_ID/firestore"
            exit 1
          fi
          echo "::error title=Firestore database create failed::Unhandled error (rc=$CREATE_RC). See log above."
          exit 1

      - name: Ensure Hosting site "pickletour" exists
        run: |
          set +e
          GET_OUT=$(firebase hosting:sites:get "$HOSTING_SITE_ID" --project "$FIREBASE_PROJECT_ID" 2>&1)
          GET_RC=$?
          if [ $GET_RC -eq 0 ]; then
            echo "Hosting site '$HOSTING_SITE_ID' already exists. OK."
            exit 0
          fi
          echo "Hosting site '$HOSTING_SITE_ID' not visible (rc=$GET_RC):"
          echo "$GET_OUT"
          echo "Attempting to create hosting site '$HOSTING_SITE_ID'..."
          CREATE_OUT=$(firebase hosting:sites:create "$HOSTING_SITE_ID" --project "$FIREBASE_PROJECT_ID" 2>&1)
          CREATE_RC=$?
          echo "$CREATE_OUT"
          if [ $CREATE_RC -eq 0 ]; then
            echo "Created hosting site '$HOSTING_SITE_ID'."
            exit 0
          fi
          if echo "$CREATE_OUT" | grep -qiE "already exists|ALREADY_EXISTS"; then
            echo "Site already exists (concurrent create). OK."
            exit 0
          fi
          if echo "$CREATE_OUT" | grep -qiE "HTTP Error: 403|PERMISSION_DENIED|caller does not have permission"; then
            echo "::error title=Missing IAM permission for Hosting site create::Service account '$SA_EMAIL' cannot create hosting sites in '$FIREBASE_PROJECT_ID'. Grant role 'Firebase Hosting Admin' at https://console.cloud.google.com/iam-admin/iam?project=$FIREBASE_PROJECT_ID OR create the site manually at https://console.firebase.google.com/project/$FIREBASE_PROJECT_ID/hosting/sites"
            exit 1
          fi
          if echo "$CREATE_OUT" | grep -qiE "HTTP Error: 409|already in use|is taken"; then
            echo "::error title=Hosting site name unavailable::The site id 'pickletour' is registered to another Firebase project globally. Pick a different site id in HOSTING_SITE_ID (workflow env) and in firebase.json (hosting.site)."
            exit 1
          fi
          echo "::error title=Hosting site create failed::Unhandled error (rc=$CREATE_RC). See log above."
          exit 1

      - name: Build production bundle
        run: npm run build

      - name: Deploy Firestore rules and indexes
        run: |
          set +e
          OUT=$(firebase deploy --only "firestore:$FIRESTORE_DATABASE_ID" --project "$FIREBASE_PROJECT_ID" --non-interactive 2>&1)
          RC=$?
          echo "$OUT"
          if [ $RC -eq 0 ]; then exit 0; fi
          if echo "$OUT" | grep -qiE "HTTP Error: 403|PERMISSION_DENIED|caller does not have permission"; then
            echo "::error title=Missing IAM permission for Firestore deploy::Service account '$SA_EMAIL' cannot deploy Firestore rules/indexes to '$FIRESTORE_DATABASE_ID' in '$FIREBASE_PROJECT_ID'. Grant role 'Firebase Admin' at https://console.cloud.google.com/iam-admin/iam?project=$FIREBASE_PROJECT_ID"
          fi
          exit $RC

      - name: Deploy Storage rules (non-fatal)
        run: |
          set +e
          OUT=$(firebase deploy --only storage --project "$FIREBASE_PROJECT_ID" --non-interactive 2>&1)
          RC=$?
          echo "$OUT"
          if [ $RC -eq 0 ]; then
            echo "Storage rules deployed."
            exit 0
          fi
          if echo "$OUT" | grep -qiE "not been set up|has not been set up|No default bucket|bucket does not exist|default bucket"; then
            echo "::warning title=Firebase Storage nao habilitado::Ative o Firebase Storage no console (https://console.firebase.google.com/project/$FIREBASE_PROJECT_ID/storage) para o upload de imagens. As storage.rules serao aplicadas no proximo deploy apos a ativacao."
          elif echo "$OUT" | grep -qiE "HTTP Error: 403|PERMISSION_DENIED|caller does not have permission"; then
            echo "::warning title=Sem permissao para deploy de Storage::Conceda 'Firebase Admin' a service account '$SA_EMAIL' para aplicar storage.rules em '$FIREBASE_PROJECT_ID'."
          else
            echo "::warning title=Deploy de Storage falhou::Veja o log acima. Hosting/Firestore nao foram afetados."
          fi
          # Nao falha o job: Hosting/Firestore ja foram aplicados.
          exit 0

      - name: Deploy Firebase Hosting
        run: |
          set +e
          OUT=$(firebase deploy --only "hosting:$HOSTING_SITE_ID" --project "$FIREBASE_PROJECT_ID" --non-interactive --message "Deploy from GitHub Actions @ ${{ github.sha }}" 2>&1)
          RC=$?
          echo "$OUT"
          if [ $RC -eq 0 ]; then
            echo "Live URL: https://$HOSTING_SITE_ID.web.app"
            exit 0
          fi
          # Idempotência: quando o conteúdo construído é idêntico ao que já está
          # no ar, o release responde 400 "is the current active version". Isso
          # significa que o site JÁ está servindo esta versão — não é uma falha.
          if echo "$OUT" | grep -qiE "is the current active version"; then
            echo "Hosting já está na versão atual (nada a publicar). OK."
            echo "Live URL: https://$HOSTING_SITE_ID.web.app"
            exit 0
          fi
          if echo "$OUT" | grep -qiE "HTTP Error: 403|PERMISSION_DENIED|caller does not have permission"; then
            echo "::error title=Missing IAM permission for Hosting deploy::Service account '$SA_EMAIL' cannot deploy to hosting site '$HOSTING_SITE_ID' in '$FIREBASE_PROJECT_ID'. Grant role 'Firebase Hosting Admin' at https://console.cloud.google.com/iam-admin/iam?project=$FIREBASE_PROJECT_ID"
          fi
          exit $RC
