name: Add Custom Domain (viralata.app)

on:
  workflow_dispatch:
    inputs:
      domain:
        description: 'Custom domain to add'
        required: true
        default: 'viralata.app'
      site:
        description: 'Firebase Hosting site ID'
        required: true
        default: 'viralata'

jobs:
  add-domain:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Add Custom Domain via Firebase API
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.sa.outputs.path }}
        run: |
          set -e
          echo "$FIREBASE_SERVICE_ACCOUNT" > /tmp/firebase-sa.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/firebase-sa.json

          # Get access token
          ACCESS_TOKEN=$(node -e "
            const sa = JSON.parse(require('fs').readFileSync('/tmp/firebase-sa.json'));
            const jwt = require('jsonwebtoken');
            const now = Math.floor(Date.now()/1000);
            const token = jwt.sign(
              { iss: sa.client_email, scope: 'https://www.googleapis.com/auth/firebase', aud: 'https://oauth2.googleapis.com/token', iat: now, exp: now + 3600 },
              sa.private_key, { algorithm: 'RS256' }
            );
            const https = require('https');
            const data = require('querystring').stringify({ grant_type: 'urn:ietf:params:oauth:grant-type:jwt-bearer', assertion: token });
            const req = https.request({ hostname: 'oauth2.googleapis.com', path: '/token', method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' } }, (res) => {
              let body = '';
              res.on('data', c => body += c);
              res.on('end', () => process.stdout.write(JSON.parse(body).access_token));
            });
            req.write(data);
            req.end();
          ")

          echo "Got access token"

          # List existing custom domains
          echo "=== Existing custom domains ==="
          curl -s -H "Authorization: Bearer $ACCESS_TOKEN" \
            "https://firebasehosting.googleapis.com/v1beta1/projects/${FIREBASE_PROJECT_ID}/sites/${SITE}/customDomains" | head -100

          # Add the custom domain
          echo "=== Adding $DOMAIN to $SITE ==="
          curl -s -X POST \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            "https://firebasehosting.googleapis.com/v1beta1/projects/${FIREBASE_PROJECT_ID}/sites/${SITE}/customDomains?customDomainId=${DOMAIN//\./_}" \
            -d "{\"hostName\": \"$DOMAIN\"}" | head -100
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIREBASE_PROJECT_ID: viralata-4cf0b
          DOMAIN: ${{ inputs.domain }}
          SITE: ${{ inputs.site }}
